<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Styling and JavaScript Task</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.section{
    margin-top:30px;
    padding:20px;
    border-radius:10px;
    background:#f4f4f4;
}

button{
    background:#0077b6;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#023e8a;
}

.option{
    display:block;
    margin:8px 0;
}

#result{
    font-size:20px;
    color:green;
    margin-top:10px;
}

#joke{
    margin-top:15px;
    font-size:18px;
    color:#222;
}

/* Responsive Design */

@media(max-width:768px){

body{
background:#caf0f8;
}

.container{
width:100%;
padding:15px;
}

h1{
font-size:28px;
}

button{
width:100%;
}

}

@media(max-width:480px){

h1{
font-size:22px;
}

.section{
padding:10px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="section">

<h2>Interactive Quiz</h2>

<p><b> Q. Which language is used for webpage styling ?</b></p>

<label class="option">
<input type="radio" name="quiz" value="HTML">
HTML
</label>

<label class="option">
<input type="radio" name="quiz" value="CSS">
CSS
</label>

<label class="option">
<input type="radio" name="quiz" value="Python">
Python
</label>

<button onclick="checkAnswer()">
Submit Answer
</button>

<p id="result"></p>

</div>

<div class="section">

<h2> Data Fetch For Funny Jokes</h2>

<button onclick="getJoke()">
Get Random Joke
</button>

<p id="joke"></p>

</div>

</div>

<script>

function checkAnswer(){

let ans=document.querySelector('input[name="quiz"]:checked');

if(ans==null){

document.getElementById("result").innerHTML="Please select an answer.";

return;

}

if(ans.value=="CSS"){

document.getElementById("result").innerHTML="✅ Correct Answer!";

}

else{

document.getElementById("result").innerHTML="❌ Wrong Answer.";

}

}

async function getJoke(){

try{

let response=await fetch("https://official-joke-api.appspot.com/random_joke");

let data=await response.json();

document.getElementById("joke").innerHTML=

"<b>"+data.setup+"</b><br><br>"+data.punchline;

}

catch{

document.getElementById("joke").innerHTML=

"Unable to fetch data. Check your internet connection.";

}

}

</script>

</body>
</html>
